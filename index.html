<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="周哥的一天">
<meta name="theme-color" content="#6366f1">
<meta name="description" content="周哥的一天 - 像素养成模拟器">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192'><rect width='192' height='192' rx='40' fill='%236366f1'/><text x='96' y='120' font-size='100' text-anchor='middle'>🎮</text></svg>">
<title>周哥的一天</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;800&display=swap');

body {
  font-family: 'Noto Sans SC', -apple-system, 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 30%, #fce7f3 60%, #dbeafe 100%);
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding: 16px;
  background-size: 400% 400%;
  animation: bgShift 20s ease infinite;
}
@keyframes bgShift {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.game {
  width: 800px; max-width: 100%;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  box-shadow: 0 8px 60px rgba(99,102,241,0.12), 0 2px 8px rgba(236,72,153,0.06);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.6);
}

/* Header */
.header {
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7, #ec4899);
  padding: 14px 22px;
  display: flex; justify-content: space-between; align-items: center;
  color: #fff;
}
.header h1 { font-size: 1em; font-weight: 800; letter-spacing: 2px; }
.header .meta { font-size: 0.75em; opacity: 0.9; display: flex; gap: 12px; align-items: center; }
.header .meta span { font-weight: 700; }
.weather-badge {
  background: rgba(255,255,255,0.2);
  padding: 3px 10px; border-radius: 12px;
  font-size: 0.9em;
}

/* Scene */
.scene {
  padding: 20px 22px;
  display: flex; align-items: center; gap: 20px;
  border-bottom: 1px solid rgba(99,102,241,0.08);
  transition: background 0.6s;
  position: relative; overflow: hidden;
}
.scene-home { background: linear-gradient(135deg, #fafafe, #f5f3ff); }
.scene-office { background: linear-gradient(135deg, #eff6ff, #e0e7ff); }
.scene-fishing { background: linear-gradient(135deg, #ecfdf5, #d1fae5); }
.scene-gaming { background: linear-gradient(135deg, #f5f3ff, #ede9fe); }
.scene-bar { background: linear-gradient(135deg, #fdf2f8, #fce7f3); }
.scene-mybar { background: linear-gradient(135deg, #fff7ed, #ffedd5); }
.scene-farm { background: linear-gradient(135deg, #f0fdf4, #dcfce7); }
.scene-gym { background: linear-gradient(135deg, #f8fafc, #f1f5f9); }
.scene-restaurant { background: linear-gradient(135deg, #fff7ed, #fef3c7); }
.scene-street { background: linear-gradient(135deg, #f0f9ff, #e0f2fe); }

.scene-enter { animation: sceneIn 0.5s ease-out; }
@keyframes sceneIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }

.char-box { flex-shrink: 0; text-align: center; position: relative; }
.char-box canvas { display: block; image-rendering: pixelated; border-radius: 16px; background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
.char-box .pet {
  position: absolute; bottom: -8px; right: -8px;
  font-size: 1.8em;
  animation: petBob 2s ease-in-out infinite;
}
@keyframes petBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.char-name { margin-top: 5px; font-size: 0.73em; font-weight: 700; color: #6366f1; }
.achievement-row { display: flex; gap: 3px; justify-content: center; margin-top: 4px; flex-wrap: wrap; }
.ach-badge {
  font-size: 0.65em; padding: 2px 7px; border-radius: 8px;
  background: linear-gradient(135deg, #ede9fe, #fce7f3);
  color: #7c3aed; font-weight: 600;
  white-space: nowrap;
}

.info-card { flex: 1; }
.info-card .time-chip {
  display: inline-block;
  background: linear-gradient(135deg, #e0e7ff, #ede9fe);
  color: #5b21b6; padding: 4px 14px; border-radius: 20px;
  font-size: 0.76em; font-weight: 700; margin-bottom: 6px;
}
.info-card .loc-title { font-size: 1.1em; font-weight: 800; color: #1e1b4b; margin-bottom: 3px; }
.info-card .loc-sub { font-size: 0.8em; color: #6b7280; line-height: 1.5; }
.info-card .weather-note { font-size: 0.7em; color: #8b5cf6; margin-top: 4px; }

/* Stats */
.stats { display: flex; padding: 10px 18px; border-bottom: 1px solid rgba(99,102,241,0.08); background: rgba(255,255,255,0.5); }
.stat { flex:1; text-align:center; }
.stat .icon { font-size: 1em; }
.stat .val { font-size: 0.82em; font-weight: 800; margin: 1px 0; }
.stat .bar-wrap { height: 3px; background: #e5e7eb; border-radius: 2px; margin: 2px 4px 0; overflow: hidden; }
.stat .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }
.s-energy .val { color: #ef4444; } .s-energy .bar-fill { background: #ef4444; }
.s-mood .val { color: #f59e0b; } .s-mood .bar-fill { background: #f59e0b; }
.s-work .val { color: #6366f1; } .s-work .bar-fill { background: #6366f1; }
.s-social .val { color: #a855f7; } .s-social .bar-fill { background: #a855f7; }
.s-luck .val { color: #ec4899; } .s-luck .bar-fill { background: #ec4899; }

/* Choices */
.choices { padding: 12px 18px 16px; display: flex; flex-direction: column; gap: 6px; }
.choice {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 15px;
  background: #fff;
  border: 1.5px solid #e5e7eb;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.choice:hover {
  border-color: #a855f7;
  background: linear-gradient(135deg, #faf5ff, #fdf2f8);
  transform: translateX(3px);
  box-shadow: 0 4px 16px rgba(168,85,247,0.1);
}
.choice:active { transform: scale(0.98); }
.choice .c-icon {
  font-size: 1.6em; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #f5f3ff, #fce7f3);
  border-radius: 10px; flex-shrink: 0;
}
.choice .c-body { flex:1; }
.choice .c-title { font-size: 0.85em; font-weight: 700; color: #1e1b4b; }
.choice .c-meta { font-size: 0.68em; color: #9ca3af; margin-top: 1px; }
.choice .c-tags { display: flex; gap: 3px; flex-shrink: 0; flex-wrap: wrap; }
.c-tag { font-size: 0.6em; padding: 2px 6px; border-radius: 5px; font-weight: 700; }
.tag-up { background: #dcfce7; color: #16a34a; }
.tag-down { background: #fef2f2; color: #dc2626; }

/* Result + animation */
.result-box { padding: 20px; text-align: center; }
.result-box .r-icon { font-size: 3.5em; animation: resultBounce 0.6s ease-out; }
@keyframes resultBounce { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
.result-box .r-text { font-size: 0.88em; color: #4b5563; line-height: 1.7; margin-top: 8px; }

/* Scene animation overlay */
.scene-anim {
  position: absolute; inset: 0; z-index: 5;
  pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s;
}
.scene-anim.active { opacity: 1; }
.scene-anim .anim-text {
  font-size: 2em;
  animation: animFloat 0.8s ease-out forwards;
}
@keyframes animFloat {
  0% { transform: translateY(20px) scale(0.5); opacity: 0; }
  50% { transform: translateY(-10px) scale(1.1); opacity: 1; }
  100% { transform: translateY(0) scale(1); opacity: 0.9; }
}

/* Mini-game overlay */
.minigame-bg {
  position: fixed; inset:0; z-index:50;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  display:flex; align-items:center; justify-content:center;
}
.minigame-card {
  background: #fff; border-radius: 20px; padding: 30px;
  text-align: center; max-width: 380px; width: 92%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.minigame-card h3 { font-size: 1.1em; color: #6366f1; margin-bottom: 6px; }
.minigame-card .mg-desc { font-size: 0.8em; color: #6b7280; margin-bottom: 16px; }
.mg-bar-wrap {
  height: 36px; background: #e5e7eb; border-radius: 18px;
  position: relative; overflow: hidden; margin: 10px 0;
}
.mg-zone {
  position: absolute; top:0; height:100%;
  background: linear-gradient(90deg, #10b981, #34d399);
  border-radius: 18px;
}
.mg-marker {
  position: absolute; top:-2px;
  width: 8px; height: 40px;
  background: #6366f1; border-radius: 4px;
  box-shadow: 0 0 12px rgba(99,102,241,0.5);
}
.mg-btn {
  margin-top: 12px; padding: 10px 32px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; border: none; border-radius: 10px;
  font-size: 0.9em; font-weight: 700; cursor: pointer;
}
.mg-btn:hover { transform: scale(1.03); }
.mg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.mg-result { font-size: 1.2em; font-weight: 800; margin-top: 8px; }

/* Modals */
.modal-bg {
  position: fixed; inset:0; z-index:100;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  display:flex; align-items:center; justify-content:center;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-card {
  background: #fff; border-radius: 24px; padding: 28px;
  max-width: 440px; width: 92%; text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.18);
  animation: popIn .35s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
.modal-card h3 { color: #6366f1; font-size: 1em; margin-bottom: 6px; }
.modal-card .ev-icon { font-size: 3em; margin-bottom: 6px; }
.modal-card .ev-text { color: #4b5563; font-size: .84em; line-height: 1.7; margin: 8px 0; }
.modal-card .ev-effects { font-size: .72em; color: #6b7280; margin: 6px 0; }
.modal-card button {
  margin-top: 12px; padding: 10px 28px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; border: none; border-radius: 10px;
  font-size: .85em; font-weight: 700; cursor: pointer;
}
.modal-card button:hover { opacity: 0.9; transform: scale(1.02); }

.grade-badge { font-size: 3em; font-weight: 900; margin: 8px 0; }
.sss-badge {
  display: inline-block;
  background: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899, #8b5cf6);
  background-size: 300% 300%;
  animation: sssShine 1.5s ease-in-out infinite;
  color: #fff; padding: 10px 28px; border-radius: 16px;
  font-size: 1em; font-weight: 900; margin: 10px 0;
}
@keyframes sssShine {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.summary-stats { display:flex; justify-content:center; gap:14px; margin:12px 0; flex-wrap:wrap; }
.summary-stats .ss { text-align:center; font-size:.74em; color:#6b7280; }
.summary-stats .ss .sv { font-size:1.2em; font-weight:800; }

.weekly-section { text-align:left; margin:10px 0; padding:10px; background:#faf5ff; border-radius:12px; }
.weekly-section h4 { color:#7c3aed; font-size:.8em; margin-bottom:4px; }
.weekly-section div { font-size:.72em; color:#6b7280; line-height:1.6; }

.footer {
  padding: 8px 18px; border-top: 1px solid rgba(99,102,241,0.08);
  display:flex; justify-content:space-between;
  font-size:.68em; color:#9ca3af;
}
.footer a { color:#6366f1; cursor:pointer; }
.footer a:hover { text-decoration:underline; }
.footer .sound-toggle { cursor:pointer; user-select:none; }
</style>
</head>
<body>

<div class="game" id="game">
  <div class="header">
    <h1>🎮 周哥的一天</h1>
    <div class="meta">
      <span class="weather-badge" id="weatherBadge">☀️ 晴天</span>
      第 <span id="dayNum">1</span> 天 · <span id="scoreNum">0</span> 分
    </div>
  </div>

  <div class="scene scene-home" id="sceneArea">
    <div class="scene-anim" id="sceneAnim"><span class="anim-text"></span></div>
    <div class="char-box">
      <canvas id="charCanvas" width="120" height="140"></canvas>
      <div class="pet" id="petEl" style="display:none">🐱</div>
      <div class="char-name" id="charName">周照宗</div>
      <div class="achievement-row" id="achRow"></div>
    </div>
    <div class="info-card">
      <div class="time-chip" id="timeChip">🌅 06:00</div>
      <div class="loc-title" id="locTitle">🏠 家里</div>
      <div class="loc-sub" id="locSub">新的一天，阳光透过窗帘洒进来，周哥缓缓睁开眼睛。</div>
      <div class="weather-note" id="weatherNote"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat s-energy"><div class="icon">⚡</div><div class="val" id="vEnergy">80</div><div class="bar-wrap"><div class="bar-fill" id="bEnergy" style="width:80%"></div></div></div>
    <div class="stat s-mood"><div class="icon">😊</div><div class="val" id="vMood">70</div><div class="bar-wrap"><div class="bar-fill" id="bMood" style="width:70%"></div></div></div>
    <div class="stat s-work"><div class="icon">📋</div><div class="val" id="vWork">40</div><div class="bar-wrap"><div class="bar-fill" id="bWork" style="width:40%"></div></div></div>
    <div class="stat s-social"><div class="icon">👥</div><div class="val" id="vSocial">50</div><div class="bar-wrap"><div class="bar-fill" id="bSocial" style="width:50%"></div></div></div>
    <div class="stat s-luck"><div class="icon">🍀</div><div class="val" id="vLuck">50</div><div class="bar-wrap"><div class="bar-fill" id="bLuck" style="width:50%"></div></div></div>
  </div>

  <div class="choices" id="choicesArea"></div>

  <div class="footer">
    <span>♋ 巨蟹座 · 🎣 路亚 · 🎮 陪玩店 · 🥃 泥煤威士忌</span>
    <span><span class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 音效</span> · <a onclick="showLog()">📜 记录</a></span>
  </div>
</div>

<script>
// ==================== GAME ENGINE ====================
const G = {
  energy:80, mood:70, work:40, social:50, luck:50,
  timeIdx:0, day:1, score:0, logs:[], scene:'home',
  weather:'sunny',
  hasCat:false, catMood:0,
  achievements:{},
  dailyStats:[],
  soundOn:true,
  // New systems
  fortune:null, // {name,icon,desc,bonus}
  challenge:null, // {id,desc,target,progress,reward}
  challengeDone:false,
  storyLine:0, // 0-5 threshold for story events
  streak:{fishing:0,cook:0,gym:0,bar:0,gaming:0}, // consecutive day streaks
};

// Weather system
const WEATHERS = {
  sunny: { icon:'☀️', name:'晴天', desc:'阳光明媚，适合出门', fishBonus:5, farmBonus:3, moodBonus:3 },
  cloudy: { icon:'⛅', name:'多云', desc:'天气舒适，不冷不热', fishBonus:0, farmBonus:0, moodBonus:0 },
  rainy: { icon:'🌧', name:'雨天', desc:'下雨天适合宅着', fishBonus:-10, farmBonus:-5, moodBonus:0, cookBonus:8 },
  windy: { icon:'💨', name:'大风', desc:'风大不适合路亚', fishBonus:-15, farmBonus:0, moodBonus:-3, gymBonus:5 },
};

function rollWeather() {
  const r = Math.random();
  G.weather = r < 0.4 ? 'sunny' : r < 0.65 ? 'cloudy' : r < 0.85 ? 'rainy' : 'windy';
}

// === FORTUNE SYSTEM ===
const FORTUNES = [
  { name:'大吉', icon:'🔮', desc:'诸事顺遂，好运爆棚', bonus:{luck:10, mood:8, social:5} },
  { name:'吉', icon:'✨', desc:'运势不错，适合出门', bonus:{luck:5, mood:5} },
  { name:'中吉', icon:'🌟', desc:'平平淡淡，稳中有进', bonus:{luck:2, work:3} },
  { name:'小吉', icon:'🍀', desc:'偶有小确幸', bonus:{luck:3, mood:3} },
  { name:'末吉', icon:'🌤', desc:'先难后易，坚持住', bonus:{work:5, energy:-3} },
  { name:'凶', icon:'💫', desc:'诸事小心，宜宅家', bonus:{luck:-5, mood:-3, social:-3} },
];
function rollFortune() {
  const r = Math.random();
  G.fortune = FORTUNES[r < 0.2 ? 0 : r < 0.4 ? 1 : r < 0.6 ? 2 : r < 0.75 ? 3 : r < 0.9 ? 4 : 5];
  // Apply fortune bonuses
  const b = G.fortune.bonus;
  if (b.luck) G.luck = cl(G.luck+b.luck);
  if (b.mood) G.mood = cl(G.mood+b.mood);
  if (b.social) G.social = cl(G.social+b.social);
  if (b.work) G.work = cl(G.work+b.work);
  if (b.energy) G.energy = cl(G.energy+b.energy);
}

// === DAILY CHALLENGE ===
const CHALLENGES = [
  { id:'fish3', desc:'今天钓3次鱼', get target(){return 3}, get progress(){return G.logs.filter(l=>l.scene==='fishing').length}, reward:25, icon:'🎣' },
  { id:'cook2', desc:'今天做2顿饭', get target(){return 2}, get progress(){return G.logs.filter(l=>l.action.includes('做饭')||l.action.includes('做顿')||l.action.includes('在家做饭')).length}, reward:20, icon:'🍳' },
  { id:'drink2', desc:'喝2杯威士忌/酒', get target(){return 2}, get progress(){return G.logs.filter(l=>l.scene==='bar'||l.scene==='mybar').length}, reward:20, icon:'🥃' },
  { id:'social3', desc:'社交互动3次', get target(){return 3}, get progress(){return G.logs.filter(l=>l.s>=10).length}, reward:20, icon:'👥' },
  { id:'gym1', desc:'去1次健身房', get target(){return 1}, get progress(){return G.logs.filter(l=>l.scene==='gym').length}, reward:15, icon:'🏋️' },
  { id:'farm2', desc:'去农场2次', get target(){return 2}, get progress(){return G.logs.filter(l=>l.scene==='farm').length}, reward:20, icon:'🌾' },
  { id:'game2', desc:'陪玩店待2次', get target(){return 2}, get progress(){return G.logs.filter(l=>l.scene==='gaming').length}, reward:20, icon:'🎮' },
];
function rollChallenge() {
  G.challenge = CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
  G.challengeDone = false;
}
function checkChallenge() {
  if (!G.challenge || G.challengeDone) return;
  if (G.challenge.progress >= G.challenge.target) {
    G.challengeDone = true;
    G.score += G.challenge.reward;
    return true;
  }
  return false;
}

// === STORY LINE ===
const STORY_EVENTS = [
  { at:0, icon:'💭', title:'心动的开始', desc:'你偶尔会想起那个女孩。她笑起来的样子，让人移不开眼。故事才刚开始。' },
  { at:1, icon:'💬', title:'第一次对话', desc:'你们终于聊了几句。虽然只是普通的寒暄，但你回去后翻看了好几遍聊天记录。' },
  { at:2, icon:'💝', title:'她开始注意到你', desc:'她主动在你的朋友圈下留了言。你知道这意味着什么——至少，她不讨厌你。' },
  { at:3, icon:'📸', title:'默契的瞬间', desc:'你们越来越多的互动，有时候一个眼神就能懂对方在想什么。朋友们都说你们很配。' },
  { at:4, icon:'💌', title:'心照不宣', desc:'你感觉有些事情就要发生了。巨蟹座的直觉告诉你——再主动一点点，可能就成了。' },
];
function checkStoryLine() {
  // Story progresses when you get love-related random events
  const loveEvents = G.logs.filter(l=>l.msg.includes('她')||l.msg.includes('喜欢')||l.msg.includes('感情')).length;
  const newLevel = Math.min(4, Math.floor(loveEvents / 2));
  if (newLevel > G.storyLine) {
    G.storyLine = newLevel;
    return STORY_EVENTS[newLevel];
  }
  return null;
}

// === 朋友圈 POSTS ===

function showMoment(trigger) {
  const m = MOMENTS.find(m=>m.trigger===trigger);
  if (!m) return;
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal-card" style="text-align:left">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:2em">👤</span>
      <div><div style="font-weight:800;color:#1e1b4b">周照宗</div><div style="font-size:.65em;color:#9ca3af">刚刚</div></div>
    </div>
    <div style="font-size:.9em;color:#1e293b;line-height:1.6;margin-bottom:10px">${m.text}</div>
    <div style="display:flex;justify-content:space-between;color:#9ca3af;font-size:.7em;padding:8px 0;border-top:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9">
      <span>❤️ ${m.likes} 赞</span><span>💬 ${m.comments.length} 评论</span>
    </div>
    ${m.comments.map(c=>`<div style="padding:6px 0;font-size:.78em"><b style="color:#6366f1">${c.name}</b>：${c.text}</div>`).join('')}
    <button onclick="this.closest('.modal-bg').remove()" style="margin-top:8px;padding:6px 20px;background:#e5e7eb;border:none;border-radius:8px;cursor:pointer;font-size:.8em">关闭</button>
  </div>`;
  document.body.appendChild(bg);
}

// === STREAK TRACKING ===
const STREAK_CATS = { fishing:'🎣钓鱼', cook:'🍳做饭', gym:'🏋️健身', bar:'🍺喝酒', gaming:'🎮游戏' };
function updateStreak(loc, action) {
  const map = { fishing:'fishing', gym:'gym', bar:'bar', mybar:'bar', gaming:'gaming' };
  const cat = map[loc];
  if (!cat) { Object.keys(G.streak).forEach(k=>{ if (!map[loc]) G.streak[k]=Math.max(0,G.streak[k]-0.5); }); return; }
  G.streak[cat] = (G.streak[cat]||0) + 1;
  Object.keys(G.streak).forEach(k=>{ if (k!==cat) G.streak[k]=Math.max(0,G.streak[k]-0.5); });
  // Check for 3+ day streak
  if (G.streak[cat] >= 3 && G.streak[cat] < 3.5) {
    setTimeout(()=>{
      const bg = document.createElement('div'); bg.className='modal-bg';
      bg.innerHTML = `<div class="modal-card"><div class="ev-icon">🔥</div><h3>状态火热！</h3><div class="ev-text">连续${Math.floor(G.streak[cat])}天${STREAK_CATS[cat]}！你是真正的${STREAK_CATS[cat].slice(2)}狂魔！额外+15分</div><button onclick="this.closest('.modal-bg').remove()">🎉 继续</button></div>`;
      document.body.appendChild(bg);
      G.score += 15;
    }, 2000);
  }
}

// ==================== PIXEL CHARACTER ====================
const canvas = document.getElementById('charCanvas');
const ctx = canvas.getContext('2d');

function drawChar() {
  ctx.clearRect(0,0,120,140);
  const s = 3; // pixel size
  const set = (x,y,w,h,c) => { ctx.fillStyle=c; ctx.fillRect(x,y,w||s,h||s); };
  const mood = G.mood;
  const H='#1a0f0a', SK='#fddcc4', MC='#dc2626', GL='#d4a853', SHIRT='#1a1a1a';

  // === 微分碎盖 HAIR ===
  for (let r=0;r<8;r++) for (let c=2;c<18;c++) set(18+c*s, 2+r*s, s, s, H);
  // Textured fringe
  for (let c=2;c<18;c++) { set(18+c*s,22,s,s,H); if(c%3===0) set(18+c*s,18,s,s*2,H); }
  for (let c=1;c<18;c+=2) set(18+c*s,0,s,s*2,H); // spiky top
  // Side fade
  set(14,18,s*2,s*10,H); set(72,18,s*2,s*10,H);
  set(16,16,s*2,s*5,H); set(70,16,s*2,s*5,H);

  // === FACE ===
  for (let r=0;r<12;r++) for (let c=2;c<18;c++) set(18+c*s, 24+r*s, s, s, SK);

  // === GOLD GLASSES ===
  // Bridge
  set(34,44,s*8,s,GL);
  // Left lens
  set(28,40,s*9,s*7,'rgba(212,168,83,0.08)');
  set(28,40,s*9,s,GL); set(28,46,s*9,s,GL);
  set(28,40,s,s*7,GL); set(36,40,s,s*7,GL);
  // Right lens
  set(48,40,s*9,s*7,'rgba(212,168,83,0.08)');
  set(48,40,s*9,s,GL); set(48,46,s*9,s,GL);
  set(48,40,s,s*7,GL); set(56,40,s,s*7,GL);
  // Temple
  set(24,42,s*3,s*1.5,GL); set(60,42,s*3,s*1.5,GL);

  // === EYES (behind glasses) ===
  const eo = mood>=75?5:mood<=25?3:4;
  set(30,42,s*5,eo,'#fff'); set(50,42,s*5,eo,'#fff');
  set(34,41,s*3,s*3,'#111'); set(54,41,s*3,s*3,'#111');
  set(37,40,s*1.5,s*1.5,'#fff'); set(57,40,s*1.5,s*1.5,'#fff');
  if (eo>=4) { set(42,38,s,s,'#fff'); set(62,38,s,s,'#fff'); }

  // === EYEBROWS ===
  const by = mood>=75?34:mood<=25?36:35;
  set(30,by,s*5,s*1.5,H); set(50,by,s*5,s*1.5,H);

  // === BLUSH ===
  const ba = mood>=80?0.5:mood>=50?0.3:0.12;
  set(26,52,s*5,s*4,`rgba(255,140,140,${ba})`);
  set(54,52,s*5,s*4,`rgba(255,140,140,${ba})`);

  // === MOUTH ===
  const my = mood>=75?70:mood<=25?76:72;
  if (mood>=75) { set(40,my,s*6,s*2,MC); set(42,my-4,s*4,s*4,MC); }
  else if (mood<=25) { set(44,my+4,s*3,s*2,MC); }
  else { set(44,my,s*3,s*2,MC); }

  // === NOSE ===
  set(46,66,s*2,s*1.5,'rgba(0,0,0,0.06)');

  // === NECKLACE ===
  set(48,72,s*6,s*1.5,GL);
  set(51,73,s*1.5,s*3,GL);

  // === BLACK T-SHIRT ===
  for (let r=0;r<10;r++) for (let c=3;c<17;c++) set(18+c*s, 74+r*s, s, s, SHIRT);
  set(42,74,s*8,s*2,'#222');

  // === ARMS ===
  for (let r=0;r<6;r++) { set(14,76+r*s,s*3,s,SK); set(72,76+r*s,s*3,s,SK); }

  // === GLASSES SHINE ===
  if (mood>=70) set(30,42,s*2,s*2,'rgba(255,255,255,0.25)');

  // Name with expression
  document.getElementById('charName').textContent =
    '周照宗 ' + (mood>=80?'(◕‿◕)':mood>=50?'(•‿•)':mood>=25?'(•_•)':'(╥_╥)');
}

function setScene(loc, animate=true) {
  G.scene = loc;
  const area = document.getElementById('sceneArea');
  area.className = 'scene ' + SCENES[loc].cls + (animate?' scene-enter':'');
  if (animate) setTimeout(()=>area.classList.remove('scene-enter'), 500);
  document.getElementById('locTitle').textContent = SCENES[loc].name;
  document.getElementById('locSub').textContent = SCENES[loc].sub;
  const w = WEATHERS[G.weather];
  document.getElementById('weatherNote').textContent = w.icon+' '+w.name+' · '+w.desc;
  drawChar();
  if (G.hasCat && (loc==='home'||loc==='farm')) {
    document.getElementById('petEl').style.display='block';
  } else {
    document.getElementById('petEl').style.display='none';
  }
}

function updStats() {
  ['Energy','Mood','Work','Social','Luck'].forEach(k => {
    const v = G[k.toLowerCase()];
    document.getElementById('v'+k).textContent = v;
    document.getElementById('b'+k).style.width = v+'%';
  });
  document.getElementById('dayNum').textContent = G.day;
  document.getElementById('scoreNum').textContent = G.score;
  document.getElementById('weatherBadge').textContent = WEATHERS[G.weather].icon+' '+WEATHERS[G.weather].name;
}

const cl = v => Math.min(100,Math.max(0,v));
function apply(a) {
  G.energy=cl(G.energy+a.e); G.mood=cl(G.mood+a.m);
  G.work=cl(G.work+a.w); G.social=cl(G.social+a.s);
  G.luck=cl(G.luck+a.l);
  // Apply weather bonus
  const w = WEATHERS[G.weather];
  if (a.loc==='fishing') { G.luck=cl(G.luck+w.fishBonus); if (w.fishBonus<0) G.mood=cl(G.mood-3); }
  if (a.loc==='farm') { G.mood=cl(G.mood+w.farmBonus); }
  if (a.loc==='home' && a.i==='🍳') G.luck=cl(G.luck+(w.cookBonus||0));
  if (a.loc==='gym' && w.gymBonus) G.energy=cl(G.energy+w.gymBonus);
}

// ==================== FISHING MINI-GAME ====================
function fishingGame(callback) {
  const bg = document.createElement('div');
  bg.className = 'minigame-bg';
  let markerPos = 0, direction = 1, speed = 2 + Math.random()*3;
  const zoneStart = 45 + Math.random()*25;
  const zoneWidth = 15 + Math.random()*15;
  let clicked = false, success = false;

  bg.innerHTML = `<div class="minigame-card">
    <h3>🎣 路亚中鱼！</h3>
    <div class="mg-desc">在绿色区域点击鼠标收线！</div>
    <div class="mg-bar-wrap" id="mgBar" style="position:relative">
      <div class="mg-zone" style="left:${zoneStart}%;width:${zoneWidth}%"></div>
      <div class="mg-marker" id="mgMarker" style="left:0%"></div>
    </div>
    <button class="mg-btn" id="mgBtn" onclick="clickFish()">🎯 收线！</button>
    <div class="mg-result" id="mgResult"></div>
  </div>`;
  document.body.appendChild(bg);

  let animId;
  function animate() {
    if (clicked) return;
    markerPos += direction * speed;
    if (markerPos >= 95) { direction = -1; markerPos=95; }
    if (markerPos <= 0) { direction = 1; markerPos=0; }
    const m = document.getElementById('mgMarker');
    if (m) m.style.left = markerPos+'%';
    animId = requestAnimationFrame(animate);
  }
  animate();

  window.clickFish = function() {
    if (clicked) return;
    clicked = true;
    cancelAnimationFrame(animId);
    success = markerPos >= zoneStart && markerPos <= (zoneStart+zoneWidth);
    const btn = document.getElementById('mgBtn');
    if (btn) btn.disabled = true;
    const res = document.getElementById('mgResult');
    if (res) {
      res.textContent = success ? '🎯 完美！大鱼上钩！渔获+1 运气+15' : '💨 鱼跑了...下次看准时机！';
      res.style.color = success ? '#10b981' : '#ef4444';
    }
    if (success) { G.luck = cl(G.luck+15); G.mood = cl(G.mood+8); }
    else { G.mood = cl(G.mood-3); }
    updStats();
    setTimeout(()=>{ bg.remove(); callback(success); }, 1500);
  };
}

// ==================== COOKING MINI-GAME ====================
function cookingGame(callback) {
  const bg = document.createElement('div');
  bg.className = 'minigame-bg';
  const ingredients = ['🍅','🥩','🌶️','🐂','🥚','🧅','🧄','🥕','🐟','🍄'];
  let targets = [], caught = 0, total = 5, timeLeft = 5;
  for (let i=0;i<total;i++) targets.push(ingredients[Math.floor(Math.random()*ingredients.length)]);

  bg.innerHTML = `<div class="minigame-card">
    <h3>🍳 做饭时间！</h3>
    <div class="mg-desc">快速点击食材！还剩 <span id="cookTime">5</span> 秒</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0;min-height:60px" id="cookArea"></div>
    <div class="mg-result" id="cookResult">抓到: 0/${total}</div>
  </div>`;
  document.body.appendChild(bg);

  let timer = setInterval(()=>{
    timeLeft--;
    const ct = document.getElementById('cookTime');
    if (ct) ct.textContent = timeLeft;
    if (timeLeft<=0) { clearInterval(timer); endCook(); }
  }, 1000);

  function spawnIngredient() {
    if (timeLeft<=0) return;
    const area = document.getElementById('cookArea');
    if (!area) return;
    const ing = targets[Math.floor(Math.random()*targets.length)];
    const el = document.createElement('span');
    el.textContent = ing; el.style.cssText = 'font-size:2em;cursor:pointer;animation:bounceIn .3s;padding:4px';
    el.onclick = ()=>{
      caught++; el.style.opacity='0.3'; el.onclick=null;
      const cr = document.getElementById('cookResult');
      if (cr) cr.textContent = '抓到: '+caught+'/'+total;
    };
    area.appendChild(el);
    if (area.children.length>8) area.firstChild.remove();
    setTimeout(()=>{ if (el.parentNode) { el.remove(); } }, 1500);
  }

  const spawnInterval = setInterval(spawnIngredient, 600);
  setTimeout(()=>spawnIngredient(), 100);

  function endCook() {
    clearInterval(spawnInterval);
    const success = caught >= total-1;
    const cr = document.getElementById('cookResult');
    if (cr) {
      cr.textContent = success ? '👨‍🍳 完美！厨艺拉满 心情+15' : '😅 手忙脚乱... 心情+5';
      cr.style.color = success ? '#10b981' : '#f59e0b';
    }
    if (success) { G.mood=cl(G.mood+15); G.social=cl(G.social+5); }
    else { G.mood=cl(G.mood+5); }
    updStats();
    setTimeout(()=>{ bg.remove(); callback(success); }, 1500);
  }
}

      glassFilled += 2.5;
      const bar = document.getElementById('beerBar');
      if (bar) bar.style.width = glassFilled+'%';
      if (glassFilled>=100) { clearInterval(pourTimer); endPour(false); }

    setTimeout(()=>endPour(glassFilled>=75 && glassFilled<=95), 300);
  };

  function endPour(success) {
    clearInterval(pourTimer);
    document.getElementById('pourBtn').disabled = true;
    const res = document.getElementById('pourResult');

      res.textContent = '🍻 完美！不多不少刚刚好！心情+15';
      res.style.color = '#10b981';
      G.mood=cl(G.mood+15); G.social=cl(G.social+8);

      res.textContent = '💦 洒了！酒溢出来了...心情-5';
      res.style.color = '#ef4444';
      G.mood=cl(G.mood-5);

      G.mood=cl(G.mood+5);
    }
    updStats();
    setTimeout(()=>{ bg.remove(); callback(success); }, 1800);
  }
  // Timeout
  setTimeout(()=>{ if (!document.getElementById('pourBtn').disabled) endPour(glassFilled>=75&&glassFilled<=95); }, 8000);
}

function farmGame(callback) {
  const bg = document.createElement('div');

  bg.innerHTML = `<div class="minigame-card">
    <h3>🐑 抓小羊！</h3>

  </div>`;
  document.body.appendChild(bg);

  const field = document.getElementById('farmField');

  function spawnSheep() {
    if (timeLeft<=0) return;
    const sheep = document.createElement('span');
    sheep.textContent = '🐑';
    sheep.style.cssText = 'position:absolute;font-size:2em;cursor:pointer;transition:all .3s;z-index:2';

    };
    field.appendChild(sheep);

  for (let i=0;i<3;i++) spawnSheep();

  const farmTimer = setInterval(()=>{
    timeLeft--;
    document.getElementById('farmTime').textContent = timeLeft;
    if (timeLeft<=0) { clearInterval(farmTimer); endFarm(); }
  }, 1000);

  function endFarm() {
    const res = document.getElementById('farmResult');

      res.textContent = '🐑 抓羊高手！运气+15 心情+10';
      res.style.color = '#10b981';

      res.style.color = '#f59e0b';
      G.luck=cl(G.luck+8);
    } else {
      res.textContent = '小羊跑太快了...运气+3';
      res.style.color = '#f59e0b';
      G.luck=cl(G.luck+3);
    }
    updStats();
    setTimeout(()=>{ bg.remove(); callback(score>=3); }, 1800);
  }
}

// ==================== ARCADE MINI-GAME (打砖块) ====================
function arcadeGame(callback) {
  const bg = document.createElement('div');
  bg.className = 'minigame-bg';
  bg.innerHTML = `<div class="minigame-card" style="max-width:420px"><h3>🕹️ 打砖块！</h3><div class="mg-desc">移动鼠标控制挡板打碎所有砖块！</div><canvas id="ac" width="360" height="240" style="background:#0a0a14;border-radius:12px;display:block;margin:8px auto"></canvas><div class="mg-result" id="ar"></div></div>`;
  document.body.appendChild(bg);
  const c=document.getElementById('ac'),ctx2=c.getContext('2d');
  let p={x:140,w:70},b={x:180,y:180,r:5,dx:3,dy:-3,on:false};
  let br=[],sc=0,go=false;
  for (let r=0;r<5;r++) for (let cl=0;cl<8;cl++) br.push({x:cl*45+2,y:r*20+10,w:41,h:16,alive:true,color:['#6366f1','#a855f7','#ec4899','#f59e0b','#10b981'][r]});
  function dr(){ctx2.clearRect(0,0,360,240);br.forEach(b=>{if(b.alive){ctx2.fillStyle=b.color;ctx2.fillRect(b.x,b.y,b.w,b.h)}});ctx2.fillStyle='#fff';ctx2.fillRect(p.x,225,p.w,8);ctx2.fillStyle='#fbbf24';ctx2.beginPath();ctx2.arc(b.x,b.y,b.r,0,Math.PI*2);ctx2.fill();ctx2.fillStyle='#fff';ctx2.font='12px sans-serif';ctx2.fillText('Score:'+sc,10,15);if(!b.on){ctx2.fillStyle='rgba(255,255,255,0.8)';ctx2.font='16px sans-serif';ctx2.fillText('移动鼠标开始',110,130)}}
  function up(){if(!b.on||go)return;b.x+=b.dx;b.y+=b.dy;if(b.x<=b.r||b.x>=360-b.r)b.dx*=-1;if(b.y<=b.r)b.dy*=-1;if(b.y>=220&&b.y<=230&&b.x>p.x-b.r&&b.x<p.x+70+b.r){b.dy=-Math.abs(b.dy);b.dx+=(b.x-p.x-35)*0.15}br.forEach(bk=>{if(!bk.alive)return;if(b.x>bk.x&&b.x<bk.x+bk.w&&b.y>bk.y&&b.y<bk.y+bk.h){bk.alive=false;b.dy*=-1;sc+=10;G.score+=2;if(br.every(bk=>!bk.alive)){go=true;end(true)}}});if(b.y>240){go=true;b.on=false;end(false)}}
  function end(win){const r=document.getElementById('ar');if(win){r.textContent='🎉 通关！街机之王！+15分';r.style.color='#10b981';G.score+=15;G.mood=cl(G.mood+12)}else{r.textContent='游戏结束！得分:'+sc+' 心情+5';r.style.color='#f59e0b';G.mood=cl(G.mood+5)}updStats();setTimeout(()=>{bg.remove();callback(win)},1800)}
  c.addEventListener('mousemove',e=>{const rect=c.getBoundingClientRect();p.x=Math.max(0,Math.min(290,e.clientX-rect.left-35));if(!b.on&&!go){b.on=true;b.x=p.x+35;b.y=180}});
  c.addEventListener('touchmove',e=>{e.preventDefault();const rect=c.getBoundingClientRect();p.x=Math.max(0,Math.min(290,e.touches[0].clientX-rect.left-35));if(!b.on&&!go){b.on=true;b.x=p.x+35;b.y=180}});
  dr();setInterval(()=>{if(!go){up();dr()}},16);
}

// === WEEKEND MODE ===
const WEEKEND_BOOST = { e:3, m:4, l:3 };
function isWeekend() { return G.day%7===6||G.day%7===0; }

// ==================== GAME FLOW ====================
function render() {
  if (G.timeIdx >= SLOTS.length) { endDay(); return; }
  const slot = SLOTS[G.timeIdx];
  document.getElementById('timeChip').textContent = slot.e + ' ' + slot.t;
  const acts = ACTS[slot.k];
  const wb = isWeekend();
  document.getElementById('choicesArea').innerHTML = acts.map((a,i) => {
    const bonus = wb ? WEEKEND_BOOST : { e:0, m:0, l:0 };
    const tags = [];
    const e=a.e+bonus.e, m=a.m+bonus.m, l=a.l+bonus.l;
    if (e>0) tags.push(`<span class="c-tag tag-up">⚡+${e}</span>`);
    else if (e<0) tags.push(`<span class="c-tag tag-down">⚡${e}</span>`);
    if (m>0) tags.push(`<span class="c-tag tag-up">😊+${m}</span>`);
    else if (m<0) tags.push(`<span class="c-tag tag-down">😊${m}</span>`);
    if (a.w>0) tags.push(`<span class="c-tag tag-up">📋+${a.w}</span>`);
    if (l>0) tags.push(`<span class="c-tag tag-up">🍀+${l}</span>`);
    const gameTag = a.game ? `<span class="c-tag tag-up">🎮小游戏</span>` : '';
    if (a.loc==='gaming') tags.push(`<span class="c-tag tag-up">🕹️街机</span>`);
    const wTag = wb ? ' ✨' : '';
    return `<div class="choice" onclick="pick(${i})">
      <div class="c-icon">${a.i}</div>
      <div class="c-body"><div class="c-title">${a.t}${wTag}</div><div class="c-meta">📍 ${SCENES[a.loc].name} ${gameTag}</div></div>
      <div class="c-tags">${tags.join('')}</div>
    </div>`;
  }).join('');

  // Show challenge progress
  if (G.challenge && !G.challengeDone) {
    const cp = G.challenge;
    document.getElementById('choicesArea').insertAdjacentHTML('beforeend',
      `<div style="text-align:center;font-size:.7em;color:#8b5cf6;padding:6px;margin-top:4px;background:#faf5ff;border-radius:8px">🎯 今日挑战：${cp.desc}（${Math.min(cp.progress,cp.target)}/${cp.target}）</div>`);
  }
}

function pick(idx) {
  const slot = SLOTS[G.timeIdx];
  const act = ACTS[slot.k][idx];

  // Determine which mini-game to trigger
  let gameType = act.game; // 'fishing' or undefined
  if (!gameType) {
    // Auto-detect mini-game based on activity
    const t = act.t; const l = act.loc;
    if (l==='gym') gameType = 'gym';
    else if (l==='bar'||l==='mybar') gameType = Math.random()<0.4 ? 'bar' : null;
    else if ((t.includes('做饭')||t.includes('做顿')) && Math.random()<0.5) gameType = 'cook';
    else if (l==='farm' && Math.random()<0.4) gameType = 'farm';
  }

  if (gameType === 'fishing' && Math.random() < 0.5) {
    fishingGame((success) => {
      if (success) act.l = (act.l||0)+15;
      finishPick(act);
    });
  } else if (gameType === 'cook') {
    cookingGame((success) => {
      if (success) { act.m = (act.m||0)+10; act.l = (act.l||0)+8; }
      finishPick(act);
    });
  } else if (gameType === 'gym') {
    gymGame((success) => {
      if (success) { act.e = (act.e||0)+5; act.m = (act.m||0)+5; }
      finishPick(act);
    });
  } else if (gameType === 'bar') {
    barGame((success) => {
      if (success) { act.m = (act.m||0)+10; act.s = (act.s||0)+5; }
      finishPick(act);
    });
  } else if (gameType === 'farm') {
    farmGame((success) => {
      if (success) { act.l = (act.l||0)+10; act.m = (act.m||0)+5; }
      finishPick(act);
    });
  } else if (gameType === 'gaming' || (act.loc==='gaming' && Math.random()<0.3)) {
    arcadeGame((win) => {
      if (win) { act.m = (act.m||0)+10; act.s = (act.s||0)+5; }
      finishPick(act);
    });
  } else {
    finishPick(act);
  }
}

function finishPick(act) {
  apply(act);

  // Scene transition animation
  const area = document.getElementById('sceneArea');
  const travelEmojis = { fishing:'🎣💦🚗', gaming:'🎮✨🏃', bar:'🍺🎵🚗', mybar:'🥃✨🏃', farm:'🌾🐑🚗', gym:'💪🔥🏃', restaurant:'🍲♨️🚗', home:'🏠💤🏃', office:'📋✅🚗', street:'🚗💨🏃' };
  const travelNames = { fishing:'前往水库边...', gaming:'去陪玩店...', bar:'去酒吧...', mybar:'去小酒吧...', farm:'去农场...', gym:'去健身房...', restaurant:'去餐厅...', home:'回家...', office:'去住建局...', street:'在路上...' };

  // Flash transition effect
  area.style.transition = 'opacity 0.2s, transform 0.2s';
  area.style.opacity = '0.6';
  area.style.transform = 'scale(0.97)';

  setTimeout(()=>{
    setScene(act.loc, false);
    area.style.opacity = '1';
    area.style.transform = 'scale(1)';
    area.classList.add('scene-enter');
    setTimeout(()=>area.classList.remove('scene-enter'), 500);
    sceneAnim(travelEmojis[act.loc]||'✨');

    // Show travel toast
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid #6366f1;color:#6366f1;padding:8px 20px;border-radius:20px;font-size:.85em;font-weight:700;z-index:30;box-shadow:0 4px 20px rgba(99,102,241,0.2);animation:toastIn .3s,toastOut .3s 1.5s forwards';
    toast.textContent = travelNames[act.loc]||'出发...';
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(), 2000);
  }, 200);

  updStats();
  G.logs.push({ time:SLOTS[G.timeIdx].t, action:act.t, scene:act.loc, msg:act.msg, cat:act.loc, s:act.s||0 });

  document.getElementById('choicesArea').innerHTML =
    `<div class="result-box"><div class="r-icon">${act.i}</div><div class="r-text">${act.msg}</div></div>`;

  // Trigger systems
  updateStreak(act.loc, act.t);

  // Show朋友圈 after certain activities (25% chance)
  const momentTriggers = { fishing:'fishing', gym:'gym', bar:'bar', mybar:'bar', farm:'farm', gaming:'gaming' };
  const mTrigger = momentTriggers[act.loc];
  if (mTrigger && Math.random()<0.25) {
    setTimeout(()=>showMoment(mTrigger), 1500);
  }

  // Check story progression
  const storyEvent = checkStoryLine();
  if (storyEvent && Math.random()<0.5) {
    setTimeout(()=>{
      const bg = document.createElement('div'); bg.className='modal-bg';
      bg.innerHTML = `<div class="modal-card"><div class="ev-icon">${storyEvent.icon}</div><h3>💘 ${storyEvent.title}</h3><div class="ev-text">${storyEvent.desc}</div><button onclick="this.closest('.modal-bg').remove()">❤️ 继续</button></div>`;
      document.body.appendChild(bg);
    }, 2000);
  }

  // Random event (30%)
  if (Math.random() < 0.3) {
    setTimeout(()=>randomEvent(), 1000);
  } else {
    setTimeout(()=>{ G.timeIdx++; render(); }, 1500);
  }
}

function randomEvent() {
  const ev = RANDOM_EVENTS[Math.floor(Math.random()*RANDOM_EVENTS.length)];
  G.energy=cl(G.energy+(ev.e||0)); G.mood=cl(G.mood+(ev.m||0));
  G.work=cl(G.work+(ev.w||0)); G.social=cl(G.social+(ev.s||0));
  G.luck=cl(G.luck+(ev.l||0));
  updStats();

  // Cat adoption trigger
  if (ev.cat==='cat' && !G.hasCat && Math.random()<0.4) {
    G.hasCat = true; G.catMood = 60;
    document.getElementById('petEl').style.display = 'block';
    ev.desc += '\n\n🐱 这只橘猫好像赖上你了！它跟着你回了家。从此你多了一个毛茸茸的室友。';
    checkAchievements();
  }

  // Random mini-game for certain event types (20% chance)
  const miniChance = Math.random();
  if (ev.cat==='cook' && miniChance<0.3) {
    showEventWithGame(ev, 'cook');
    return;
  } else if (ev.cat==='bar' && miniChance<0.3) {
    showEventWithGame(ev, 'bar');
    return;
  } else if (ev.cat==='farm' && miniChance<0.3) {
    showEventWithGame(ev, 'farm');
    return;
  }

  showEventModal(ev);
}

function showEventWithGame(ev, gameType) {
  const gameFn = gameType==='cook'?cookingGame:gameType==='bar'?barGame:farmGame;
  const gameName = gameType==='cook'?'🍳 做饭小游戏':gameType==='bar'?'🍺 倒酒挑战':'🐑 抓小羊';
  ev.desc += '\n\n🎮 触发'+gameName+'！';
  showEventModal(ev, ()=>{ gameFn(()=>{ G.timeIdx++; render(); }); });
}

function showEventModal(ev, hasGame) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.id = 'evModal';
  bg.innerHTML = `<div class="modal-card">
    <div class="ev-icon">${ev.icon}</div>
    <h3>🎲 ${ev.title}</h3>
    <div class="ev-text">${ev.desc.replace(/\n/g,'<br>')}</div>
    <div class="ev-effects">${ev.m?'😊心情 +'+ev.m+' ':''}${ev.s?'👥社交 +'+ev.s+' ':''}${ev.l?'🍀运气 +'+ev.l+' ':''}</div>
    <button id="evBtn">继续</button>
  </div>`;
  document.body.appendChild(bg);
  document.getElementById('evBtn').onclick = function() {
    bg.remove();
    if (hasGame) { hasGame(); } else { G.timeIdx++; render(); }
  };
}

// ==================== END DAY + WEEKLY ====================
function endDay() {
  const avg = (G.energy+G.mood+G.work+G.social+G.luck)/5;
  let grade, color;
  if (avg>=92) { grade='SSS+'; color='#f59e0b'; }
  else if (avg>=83) { grade='S'; color='#f59e0b'; }
  else if (avg>=70) { grade='A'; color='#6366f1'; }
  else if (avg>=57) { grade='B'; color='#8b5cf6'; }
  else if (avg>=44) { grade='C'; color='#f97316'; }
  else { grade='D'; color='#ef4444'; }

  const isSSS = grade === 'SSS+';
  G.score += Math.round(avg);
  G.dailyStats.push({ day:G.day, grade, avg:Math.round(avg), energy:G.energy, mood:G.mood, work:G.work, social:G.social, luck:G.luck });

  // Check SSS achievement + daily challenge
  if (isSSS) { G.achievements.sss = true; renderAchievements(); }
  const challengeDone = checkChallenge();
  if (challengeDone) { G.score += G.challenge.reward; }

  const specials = [];
  if (G.mood>=85) specials.push('今天心情格外好…是不是跟她有关？');
  if (G.social>=85) specials.push('社交之王！陪玩店和酒吧两头跑人脉拉满。');
  if (G.luck>=85) specials.push('运气爆棚！钓鱼爆护还免了单，今天是什么神仙日子。');
  if (G.hasCat) specials.push('回家的时候橘猫已经在门口等着了，冲你喵了一声。');

  // Weekly report every 7 days
  let weeklyHTML = '';
  if (G.day % 7 === 0 && G.dailyStats.length >= 7) {
    const week = G.dailyStats.slice(-7);
    const wAvg = Math.round(week.reduce((s,d)=>s+d.avg,0)/7);
    const best = week.reduce((a,b)=>a.avg>b.avg?a:b);
    const fishDays = G.logs.filter(l=>l.scene==='fishing').length;
    const barDays = G.logs.filter(l=>l.scene==='bar'||l.scene==='mybar').length;
    const cookEvents = G.logs.filter(l=>l.msg.includes('做饭')||l.msg.includes('鸡蛋')||l.msg.includes('牛腩')||l.msg.includes('肉')).length;
    weeklyHTML = `<div class="weekly-section">
      <h4>📊 第${Math.floor(G.day/7)}周周报</h4>
      <div>本周均分：${wAvg} · 最高：第${best.day}天 ${best.grade}(${best.avg}分)<br>
      🎣钓鱼${fishDays}次 · 🍺喝酒${barDays}次 · 🍳做饭${cookEvents}次<br>
      ${G.hasCat?'🐱 橘猫陪伴了你7天':' '}</div></div>`;
  }

  document.getElementById('choicesArea').innerHTML = '';

  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal-card">
    <h3>🌙 周哥的一天 · 完结</h3>
    ${weeklyHTML}
    <div class="summary-stats">
      <div class="ss"><div class="sv" style="color:#ef4444">${G.energy}</div>精力</div>
      <div class="ss"><div class="sv" style="color:#f59e0b">${G.mood}</div>心情</div>
      <div class="ss"><div class="sv" style="color:#6366f1">${G.work}</div>效率</div>
      <div class="ss"><div class="sv" style="color:#a855f7">${G.social}</div>社交</div>
      <div class="ss"><div class="sv" style="color:#ec4899">${G.luck}</div>运气</div>
    </div>
    ${challengeDone ? `<div style="background:#fef3c7;padding:8px;border-radius:10px;margin:8px 0;font-size:.8em;color:#f59e0b;font-weight:700">🎯 每日挑战完成！+${G.challenge.reward}分</div>` : ''}
    <div class="grade-badge" style="color:${color}">${grade}</div>
    ${isSSS ? `<div class="sss-badge">🏆 神秘奖励解锁！截图找周哥领奖 🥃</div>` : ''}
    <div class="ev-text">${specials.map(s=>'💭 '+s).join('<br>')}</div>
    <div style="color:#9ca3af;font-size:.72em;margin-top:8px">总积分 ${G.score} · 成就 ${Object.values(G.achievements).filter(Boolean).length}/${Object.keys(ACHIEVEMENTS).length}</div>
    <button onclick="restart();this.closest('.modal-bg').remove()">🔄 再来一天</button>
  </div>`;
  document.body.appendChild(bg);

  checkAchievements();
}
